name: Build & Release
on:
  push:
    branches: [master]
    tags:
      - 'v*'

jobs:
  build:
    name: Build x86_64-linux-musl
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install musl cross-compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --profile dist --target x86_64-unknown-linux-musl

      - name: Create archive
        run: |
          ARCHIVE="tt_to_tg_bot-${{ github.sha }}-x86_64-unknown-linux-musl.tar.gz"
          tar czf "$ARCHIVE" \
            -C target/x86_64-unknown-linux-musl/dist tt_to_tg_bot
          sha256sum "$ARCHIVE" > "$ARCHIVE.sha256"

      - name: Upload archive as artifact
        uses: actions/upload-artifact@v4
        with:
          name: tt_to_tg_bot-${{ github.sha }}-x86_64-unknown-linux-musl
          path: tt_to_tg_bot-*.tar.gz*

      - name: Upload release asset (only on tags)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: tt_to_tg_bot-*.tar.gz*
