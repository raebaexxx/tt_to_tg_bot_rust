name: Build & Release
on:
  push:
    branches: [master]
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build x86_64-linux-musl
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install musl cross-compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --profile dist --target x86_64-unknown-linux-musl

      - name: Prepare binary
        run: |
          cp target/x86_64-unknown-linux-musl/dist/tt_to_tg_bot tt_to_tg_bot-x86_64-linux-musl
          sha256sum tt_to_tg_bot-x86_64-linux-musl > tt_to_tg_bot-x86_64-linux-musl.sha256

      - name: Upload to continuous release
        uses: ncipollo/release-action@v1
        with:
          tag: latest
          name: Latest build (${{ github.sha }})
          body: |
            Автоматическая сборка после коммита ${{ github.sha }}

            ## Установка на сервере
            ```bash
            chmod +x tt_to_tg_bot-x86_64-linux-musl
            echo "TELEGRAM_BOT_TOKEN=ваш_токен" > .env
            sudo apt install -y ffmpeg yt-dlp
            ./tt_to_tg_bot-x86_64-linux-musl
            ```
          allowUpdates: true
          replacesArtifacts: true
          artifacts: tt_to_tg_bot-x86_64-linux-musl*
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload versioned release (on tags)
        if: startsWith(github.ref, 'refs/tags/')
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          allowUpdates: true
          replacesArtifacts: true
          artifacts: tt_to_tg_bot-x86_64-linux-musl*
          token: ${{ secrets.GITHUB_TOKEN }}
