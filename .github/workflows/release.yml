name: Build & Release
on:
  push:
    branches: [master]
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --profile dist --target ${{ matrix.target }}

      - name: Create archive
        run: |
          ARCHIVE="tt_to_tg_bot-${{ github.sha }}-${{ matrix.target }}.tar.gz"
          tar czf "$ARCHIVE" \
            -C target/${{ matrix.target }}/dist tt_to_tg_bot
          sha256sum "$ARCHIVE" > "$ARCHIVE.sha256"

      - name: Upload archive as artifact
        uses: actions/upload-artifact@v4
        with:
          name: tt_to_tg_bot-${{ github.sha }}-${{ matrix.target }}
          path: tt_to_tg_bot-*.tar.gz*

      - name: Upload release asset (only on tags)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: tt_to_tg_bot-*.tar.gz*
