name: Build & Release
on:
  push:
    branches: [master]
    tags:
      - 'v*'

jobs:
  build:
    name: Build x86_64-linux-musl
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install musl cross-compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --profile dist --target x86_64-unknown-linux-musl

      - name: Create archive
        run: |
          ARCHIVE="tt_to_tg_bot-${{ github.sha }}-x86_64-unknown-linux-musl.tar.gz"
          tar czf "$ARCHIVE" \
            -C target/x86_64-unknown-linux-musl/dist tt_to_tg_bot
          sha256sum "$ARCHIVE" > "$ARCHIVE.sha256"

      - name: Upload to continuous release
        uses: ncipollo/release-action@v1
        with:
          tag: latest
          name: Latest build (${{ github.sha }})
          body: |
            Автоматическая сборка после коммита ${{ github.sha }}

            ## Установка на сервере
            ```bash
            tar xzf tt_to_tg_bot-*.tar.gz
            echo "TELEGRAM_BOT_TOKEN=ваш_токен" > .env
            sudo apt install -y ffmpeg yt-dlp
            ./tt_to_tg_bot
            ```
          allowUpdates: true
          replacesArtifacts: true
          artifacts: tt_to_tg_bot-*.tar.gz*
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload versioned release (on tags)
        if: startsWith(github.ref, 'refs/tags/')
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          allowUpdates: true
          replacesArtifacts: true
          artifacts: tt_to_tg_bot-*.tar.gz*
          token: ${{ secrets.GITHUB_TOKEN }}
